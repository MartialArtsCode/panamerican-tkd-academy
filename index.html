<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App-Do | Panamerican Taekwondo Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* --- Widget Styles --- */
        .chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: sans-serif; }
        .chat-widget-button {
            width: 70px; height: 70px; border-radius: 50%; background: #d4af37; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: relative; display: flex; align-items: center; justify-content: center;
        }
        .chat-icon-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #d4af37; }
        .chat-pulse {
            position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #d4af37;
            opacity: 0.6; z-index: -1; animation: pta-pulse 2s infinite;
        }
        @keyframes pta-pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
        .chat-badge {
            position: absolute; top: -2px; right: -2px; background: #ff0000; color: white; width: 24px; height: 24px;
            border-radius: 50%; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .chat-widget-popup {
            position: absolute; bottom: 90px; right: 0; width: 320px; background: white; border-radius: 15px;
            display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; border: 1px solid #eee;
        }
        .chat-header { background: #000; color: #d4af37; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-status { font-size: 11px; color: #4CAF50; margin: 0; display: flex; align-items: center; }
        .status-dot { height: 8px; width: 8px; background-color: #4CAF50; border-radius: 50%; margin-right: 5px; }
        .chat-body { padding: 20px; background: #fff; max-height: 250px; overflow-y: auto; color: #444; }
        .chat-footer { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #f0f0f0; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 25px; outline: none; }
        .chat-send-btn { background: #d4af37; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; }
        
        /* --- External Google Section Styles --- */
        .google-reviews-section { padding: 50px 20px; text-align: center; background: #f9f9f9; }
        .stars-outer { color: #f4c150; font-size: 24px; margin-bottom: 10px; }
        .google-btn { 
            display: inline-block; padding: 12px 30px; border: 2px solid #4285F4; 
            color: #4285F4; border-radius: 30px; text-decoration: none; 
            font-weight: bold; transition: 0.3s; margin-top: 15px;
        }
        .google-btn:hover { background: #4285F4; color: #fff; }
    </style>
</head>
<body>

    <header><img src="full.png" alt="Panamerican TKD" class="header-logo"></header>
    
    <main>
        <section id="home" class="hero-section">
            <h2 class="hero-title">Master the Art of Taekwondo</h2>
        </section>

        <section id="testimonials" class="google-reviews-section">
            <div class="container">
                <h2>What Our Students Say</h2>
                <div class="stars-outer">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                </div>
                <p><strong>5.0 Rating</strong> based on student experiences in Winston-Salem.</p>
                <a href="https://www.google.com/search?q=panamerican+taekwondo+academy" target="_blank" class="google-btn">
                    <i class="fab fa-google"></i> Read All Google Reviews
                </a>
            </div>
        </section>
    </main>

    <div class="chat-widget" id="chatWidget">
        <button class="chat-widget-button" onclick="toggleChat()">
            <img src="logo.png" alt="Logo" class="chat-icon-img">
            <span class="chat-pulse"></span>
            <span class="chat-badge">1</span>
        </button>

        <div class="chat-widget-popup" id="chatPopup">
            <div class="chat-header">
                <div>
                    <h4 style="margin:0">Master Chat</h4>
                    <p class="chat-status"><span class="status-dot"></span>Online</p>
                </div>
                <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:24px;">&times;</button>
            </div>
            <div class="chat-body">
                <p>🥋 <strong>Welcome!</strong><br>How can we help you today?</p>
            </div>
            <div class="chat-footer">
                <div class="chat-input-row">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Message Master...">
                    <button class="chat-send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "3581131"; 
        const phoneNumber = "13366248499";

        function toggleChat() {
            const popup = document.getElementById('chatPopup');
            const badge = document.querySelector('.chat-badge');
            const isVisible = popup.style.display === 'flex';
            popup.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible && badge) badge.style.display = 'none';
        }

        function handleSend() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const url = `https://api.callmebot.com/whatsapp.php?phone=${phoneNumber}&apikey=${apiKey}&text=${encodeURIComponent(message)}`;
            
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    alert("Message sent to the Master!");
                    input.value = "";
                })
                .catch(() => {
                    window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
                });
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
