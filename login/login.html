<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Panamerican Taekwondo Academy</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="../icon.png" alt="PTA Logo">
            <h1>Panamerican<br>Taekwondo Academy<span>Instructor Portal</span></h1>
        </div>
        <h2>Sign In</h2>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="instructor@pta.com" autocomplete="username"
                    required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password"
                    autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
            <p class="error-msg" id="errorMsg">Invalid email or password.</p>
        </form>
        <a href="../index.html" class="back-link">← Back to main site</a>
    </div>

    <script src="script.js"></script>
</body>

</html>
